name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm type-check
      - name: Check documentation
        run: node scripts/sync-docs.js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test
        run: pnpm test

  test-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Visual regression tests
        run: pnpm test:visual
      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: test-results/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build
      - name: Build examples
        run: pnpm build:examples
      - name: Measure sizes
        run: pnpm size:json
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            size-results.json
          if-no-files-found: error

  quality:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      
      - name: Generate size badges
        run: |
          mkdir -p badges
          node -e "
            const data = JSON.parse(require('fs').readFileSync('size-results.json', 'utf8'));
            const fs = require('fs');
            // Core badges
            const core = data.find(d => d.name === 'levita-js') || data[0];
            const coreContent = JSON.stringify({ schemaVersion: 1, label: 'gzip', message: (core.size / 1024).toFixed(1) + ' kB', color: 'brightgreen' });
            fs.writeFileSync('badges/badge-size.json', coreContent);
            fs.writeFileSync('badges/badge-size-core.json', coreContent);
            // Package badges
            for (const entry of data) {
              const slug = entry.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
              fs.writeFileSync('badges/badge-size-' + slug + '.json', JSON.stringify({ schemaVersion: 1, label: 'gzip', message: (entry.size / 1024).toFixed(1) + ' kB', color: 'brightgreen' }));
            }
          "
      
      - name: Benchmark
        run: |
          pnpm bench 2>&1 | sed 's/\x1b\[[0-9;]*m//g' > bench-raw.txt
          node benchmarks/convert-results.cjs
          node -e "
            if (!require('fs').existsSync('bench-results.json')) process.exit(0);
            const data = JSON.parse(require('fs').readFileSync('bench-results.json', 'utf8'));
            const fs = require('fs');
            for (const entry of data) {
              const slug = entry.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace('levita-levita', 'levita');
              const value = entry.value >= 1000 ? '~' + Math.round(entry.value / 1000) + 'k' : Math.round(entry.value);
              fs.writeFileSync('badges/badge-bench-' + slug + '.json', JSON.stringify({ schemaVersion: 1, label: entry.name.split(/[-—–]/).pop().trim(), message: value + ' ops/s', color: 'blue' }));
            }
          "
      
      - name: Upload quality results
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: badges/

  deploy:
    needs: [quality, lint, test-visual]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      
      - name: Build demo
        run: pnpm --filter levita-demo build
      
      - name: Download quality results
        uses: actions/download-artifact@v4
        with:
          name: quality-artifacts
          path: demo/dist/
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist/
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
