name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Lint
        run: pnpm lint
      - name: Build All Packages
        run: pnpm build
      - name: Type check
        run: pnpm -r run type-check
      - name: Check documentation
        run: node scripts/sync-docs.js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Test
        run: pnpm test

  test-compatibility:
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: react
            framework: react
            version: "16.8.0"
          - package: react
            framework: react
            version: "17.0.2"
          - package: react
            framework: react
            version: "18.3.1"
          - package: react
            framework: react
            version: "19.0.0"
          - package: svelte
            framework: svelte
            version: "3.59.2"
          - package: svelte
            framework: svelte
            version: "4.2.19"
          - package: svelte
            framework: svelte
            version: "5.0.0"
          - package: vue
            framework: vue
            version: "3.3.0"
          - package: vue
            framework: vue
            version: "3.4.0"
          - package: vue
            framework: vue
            version: "3.5.0"
          - package: angular
            framework: "@angular/core"
            version: "14.0.0"
            node-version: "18"
          - package: angular
            framework: "@angular/core"
            version: "15.0.0"
            node-version: "18"
          - package: angular
            framework: "@angular/core"
            version: "16.0.0"
          - package: angular
            framework: "@angular/core"
            version: "17.0.0"
          - package: angular
            framework: "@angular/core"
            version: "18.0.0"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node ${{ matrix.node-version }}
        if: ${{ matrix.node-version != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - name: Setup Project
        if: ${{ matrix.node-version == '' }}
        uses: ./.github/actions/setup
        
      - name: Manual Setup for old Node
        if: ${{ matrix.node-version != '' }}
        shell: bash
        run: |
          if [ "${{ matrix.node-version }}" = "16" ]; then
            npm install -g pnpm@8
          else
            npm install -g pnpm@9
          fi
          pnpm install --no-frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Test ${{ matrix.package }}@${{ matrix.version }}
        run: |
          ROOT_DIR=$(pwd)
          COMPAT_DIR="/tmp/compat-${{ matrix.package }}-${{ matrix.version }}"
          mkdir -p $COMPAT_DIR/package
          
          # Copy package source
          cp -r packages/${{ matrix.package }}/src $COMPAT_DIR/package/
          
          # Copy core build to temp dir to avoid monorepo links
          cp -r packages/core $COMPAT_DIR/core
          
          echo '{
            "name": "compat-test",
            "private": true,
            "type": "module",
            "dependencies": {
              "levita-js": "file:../core"
            },
            "devDependencies": {
              "${{ matrix.framework }}": "${{ matrix.version }}",
              "vitest": "4.0.18",
              "happy-dom": "20.7.0"
            }
          }' > $COMPAT_DIR/package/package.json

          # Create a minimal tsconfig.json for esbuild/vitest
          JSX_RUNTIME="react-jsx"
          if [ "${{ matrix.package }}" = "react" ] && [ "${{ matrix.version }}" = "16.8.0" ]; then
            JSX_RUNTIME="react"
          fi
          echo "{
            \"compilerOptions\": {
              \"target\": \"ES2022\",
              \"module\": \"ESNext\",
              \"moduleResolution\": \"bundler\",
              \"jsx\": \"$JSX_RUNTIME\",
              \"experimentalDecorators\": true,
              \"emitDecoratorMetadata\": true,
              \"skipLibCheck\": true
            }
          }" > $COMPAT_DIR/package/tsconfig.json

          cd $COMPAT_DIR/package
          # Add framework-specific testing tools
          if [ "${{ matrix.package }}" = "react" ]; then
            RTL_VERSION="16.3.2"
            if [ "${{ matrix.version }}" = "16.8.0" ] || [ "${{ matrix.version }}" = "17.0.2" ]; then
              RTL_VERSION="12.1.5"
            fi
            pnpm add -D react-dom@${{ matrix.version }} @testing-library/react@$RTL_VERSION @testing-library/dom @types/react @types/react-dom --no-strict-peer-dependencies
          elif [ "${{ matrix.package }}" = "vue" ]; then
            pnpm add -D @vue/test-utils@2.4.6 --no-strict-peer-dependencies
          elif [ "${{ matrix.package }}" = "angular" ]; then
            pnpm add -D @angular/compiler@${{ matrix.version }} @angular/platform-browser-dynamic@${{ matrix.version }} zone.js reflect-metadata --no-strict-peer-dependencies
          fi

          # 5. Install (standalone)
          pnpm install --no-frozen-lockfile --no-strict-peer-dependencies

          # 6. Run tests with the dedicated compat config
          cp $ROOT_DIR/vitest.compat.config.ts ./vitest.config.ts
          
          # Framework specific setup
          if [ "${{ matrix.package }}" = "angular" ]; then
            echo "import 'zone.js';" > setup.ts
            echo "import 'zone.js/testing';" >> setup.ts
            echo "import 'reflect-metadata';" >> setup.ts
            sed -i "s|test: {|test: { setupFiles: ['./setup.ts'],|" vitest.config.ts
          elif [ "${{ matrix.package }}" = "react" ] && [ "${{ matrix.version }}" = "16.8.0" ]; then
            # Inject React global for legacy JSX transform
            echo "import * as React from 'react'; globalThis.React = React;" > setup.ts
            sed -i "s|test: {|test: { setupFiles: ['./setup.ts'],|" vitest.config.ts
          fi
          
          pnpm exec vitest run src

      - name: Save result
        if: always()
        run: |
          mkdir -p $GITHUB_WORKSPACE/compat-results
          echo "${{ job.status }}" > $GITHUB_WORKSPACE/compat-results/${{ matrix.package }}-${{ matrix.version }}.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compat-${{ matrix.package }}-${{ matrix.version }}
          path: compat-results/

  test-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Visual regression tests
        run: pnpm test:visual
      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: test-results/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build
      - name: Build examples
        run: pnpm build:examples
      - name: Measure sizes
        run: pnpm size:json
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            size-results.json
          if-no-files-found: error

  quality:
    needs: [build, test, test-compatibility]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
          
      - name: Download compatibility results
        uses: actions/download-artifact@v4
        with:
          pattern: compat-*
          path: compat-results
          merge-multiple: true
      
      - name: Generate size badges
        run: |
          mkdir -p badges
          node -e "
            const data = JSON.parse(require('fs').readFileSync('size-results.json', 'utf8'));
            const fs = require('fs');
            // Core badges
            const core = data.find(d => d.name === 'levita-js') || data[0];
            const coreContent = JSON.stringify({ schemaVersion: 1, label: 'gzip', message: (core.size / 1024).toFixed(1) + ' kB', color: 'brightgreen' });
            fs.writeFileSync('badges/badge-size.json', coreContent);
            fs.writeFileSync('badges/badge-size-core.json', coreContent);
            // Package badges
            for (const entry of data) {
              const slug = entry.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
              fs.writeFileSync('badges/badge-size-' + slug + '.json', JSON.stringify({ schemaVersion: 1, label: 'gzip', message: (entry.size / 1024).toFixed(1) + ' kB', color: 'brightgreen' }));
            }
          "
      
      - name: Benchmark
        run: |
          pnpm bench 2>&1 | sed 's/\x1b\[[0-9;]*m//g' > bench-raw.txt
          node benchmarks/convert-results.cjs
          node -e "
            if (!require('fs').existsSync('bench-results.json')) process.exit(0);
            const data = JSON.parse(require('fs').readFileSync('bench-results.json', 'utf8'));
            const fs = require('fs');
            for (const entry of data) {
              const slug = entry.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace('levita-levita', 'levita');
              const value = entry.value >= 1000 ? '~' + Math.round(entry.value / 1000) + 'k' : Math.round(entry.value);
              fs.writeFileSync('badges/badge-bench-' + slug + '.json', JSON.stringify({ schemaVersion: 1, label: entry.name.split(/[-—–]/).pop().trim(), message: value + ' ops/s', color: 'blue' }));
            }
          "
      
      - name: Generate version badges
        run: |
          mkdir -p badges
          node -e "
            const fs = require('fs');
            const path = 'compat-results';
            if (!fs.existsSync(path)) {
              console.log('No compatibility results found');
              process.exit(0);
            }
            const files = fs.readdirSync(path);
            const packages = ['react', 'svelte', 'vue', 'angular'];
            const results = {};
            
            for (const file of files) {
              // Extract package and version from filename like 'react-16.8.0.txt'
              const parts = file.replace('.txt', '').split(/-(?=[0-9])/);
              const pkg = parts[0];
              const version = parts[1];
              const status = fs.readFileSync(path + '/' + file, 'utf8').trim();
              if (!results[pkg]) results[pkg] = [];
              results[pkg].push({ version, status });
            }
            
            for (const pkg of packages) {
              const pkgResults = results[pkg] || [];
              const successful = pkgResults.filter(r => r.status === 'success');
              
              let versionDisplay = 'unknown';
              if (successful.length > 0) {
                // Find minimum version
                const sorted = successful.map(r => r.version).sort((a, b) => {
                  const partsA = a.split('.').map(Number);
                  const partsB = b.split('.').map(Number);
                  for (let i = 0; i < 3; i++) {
                    if ((partsA[i] || 0) < (partsB[i] || 0)) return -1;
                    if ((partsA[i] || 0) > (partsB[i] || 0)) return 1;
                  }
                  return 0;
                });
                const minVersion = sorted[0];
                // For the badge, we usually show major or major.minor
                const parts = minVersion.split('.');
                versionDisplay = (parts[0] === '0' ? parts[0] + '.' + parts[1] : parts[0]) + '+';
              } else {
                // Fallback to peerDependencies if no tests succeeded (should not happen if CI passes)
                try {
                  const content = JSON.parse(fs.readFileSync('packages/' + pkg + '/package.json', 'utf8'));
                  const peerDeps = content.peerDependencies || {};
                  const frameworkName = pkg === 'angular' ? '@angular/core' : pkg;
                  const version = peerDeps[frameworkName] || 'unknown';
                  versionDisplay = version.replace('>=', '') + '+';
                } catch (e) {}
              }
              
              fs.writeFileSync('badges/badge-version-' + pkg + '.json', JSON.stringify({
                schemaVersion: 1,
                label: 'version',
                message: versionDisplay,
                color: 'blue'
              }));
            }
          "

      - name: Upload quality results
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: badges/

  deploy:
    needs: [quality, lint, test-visual]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      
      - name: Build demo
        run: pnpm --filter levita-demo build
      
      - name: Download quality results
        uses: actions/download-artifact@v4
        with:
          name: quality-artifacts
          path: demo/dist/
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist/
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
